    <body>
      <div id="root"></div>
    <script>
      // GitHub Pages SPA redirect support (works with 404.html fallback).
      // Important: this must NOT run on Vercel/custom domains.
      (function (l) {
        var isGitHubPages = l.hostname.endsWith("github.io");
        if (!isGitHubPages) return;
        if (l.search[1] === "/") {
          const decoded = l.search
            .slice(1)
            .split("&")
            .map(function (s) {
              return s.replace(/~and~/g, "&");
            })
            .join("?");
          window.history.replaceState(
            null,
            "",
            l.pathname.slice(0, -1) + decoded + l.hash,
          );
        }
      })(window.location);
    </script>
